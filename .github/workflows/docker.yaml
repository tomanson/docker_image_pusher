name: Docker

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  ALIYUN_REGISTRY: "${{ secrets.ALIYUN_REGISTRY }}"
  ALIYUN_NAME_SPACE: "${{ secrets.ALIYUN_NAME_SPACE }}"
  ALIYUN_REGISTRY_USER: "${{ secrets.ALIYUN_REGISTRY_USER }}"
  ALIYUN_REGISTRY_PASSWORD: "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"

jobs:

  build:
    name: Build and Push
    runs-on: ubuntu-latest
    steps:
    - name: Before freeing up disk space
      run: |
        echo "Before freeing up disk space"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    # 增加可用磁盘空间
    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 2048
        swap-size-mb: 128
        remove-dotnet: 'true'
        remove-haskell: 'true'
        build-mount-path: '/var/lib/docker/'

    - name: Restart docker
      run: sudo service docker restart

    - name: Free up disk space complete
      run: |
        echo "Free up disk space complete"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    # --- 核心修改开始 ---
    
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Docker Setup Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push image Aliyun
      run: |
        # 1. 登录阿里云
        echo "$ALIYUN_REGISTRY_PASSWORD" | docker login -u "$ALIYUN_REGISTRY_USER" --password-stdin "$ALIYUN_REGISTRY"

        # 2. 数据预处理：判断镜像是否重名
        declare -A duplicate_images
        declare -A temp_map
        
        while IFS= read -r line || [ -n "$line" ]; do
            # 忽略空行与注释
            [[ -z "$line" ]] && continue
            if echo "$line" | grep -q '^\s*#'; then
                continue
            fi
            
            # 获取纯净的镜像定义（去除 --platform 参数）
            # 使用 sed 删除 --platform 及其后的参数，然后使用 xargs 去除首尾空格
            clean_line=$(echo "$line" | sed -E 's/--platform[= ]+[^ ]+//g' | xargs)
            
            # 获取镜像的完整名称，例如 kasmweb/nginx:1.25.3
            image=$(echo "$clean_line" | awk '{print $NF}')
            image="${image%%@*}" # 去除 @sha256...
            
            # 获取镜像名:版本号 (例如 nginx:1.25.3)
            image_name_tag=$(echo "$image" | awk -F'/' '{print $NF}')
            
            # 获取命名空间 (例如 kasmweb)
            name_space=$(echo "$image" | awk -F'/' '{if (NF==3) print $2; else if (NF==2) print $1; else print ""}')
            name_space="${name_space}_" # 防止空值干扰
            
            # 获取镜像名 (例如 nginx)
            image_name=$(echo "$image_name_tag" | awk -F':' '{print $1}')
            
            # 判断重名逻辑
            if [[ -n "${temp_map[$image_name]}" ]]; then
                 if [[ "${temp_map[$image_name]}" != $name_space ]]; then
                    echo "duplicate image name: $image_name"
                    duplicate_images[$image_name]="true"
                 fi
            else
                temp_map[$image_name]=$name_space
            fi       
        done < images.txt
        
        # 3. 循环处理 images.txt 中的每一行
        while IFS= read -r line || [ -n "$line" ]; do
            # 忽略空行与注释
            [[ -z "$line" ]] && continue
            if echo "$line" | grep -q '^\s*#'; then
                continue
            fi
            
            # --- 关键修改：解析参数 ---
            # 提取 --platform 参数 (如果存在)
            platform=$(echo "$line" | grep -oP '(?<=--platform[ =])[^ ]+')
            if [ -z "$platform" ]; then
                platform="linux/amd64" # 默认平台
            fi
            echo "Build platform: $platform"
            
            # 提取纯净的镜像源地址 (去掉 --platform 参数后的部分)
            source_image=$(echo "$line" | sed -E 's/--platform[= ]+[^ ]+//g' | xargs)
            echo "Source image definition: $source_image"

            # 解析源镜像的各个部分 (用于生成新名字)
            # 获取镜像名:版本号
            image_name_tag=$(echo "$source_image" | awk -F'/' '{print $NF}')
            # 获取命名空间
            name_space=$(echo "$source_image" | awk -F'/' '{if (NF==3) print $2; else if (NF==2) print $1; else print ""}')
            # 获取纯镜像名
            image_name=$(echo "$image_name_tag" | awk -F':' '{print $1}')
            # 获取标签 (如果没有则默认为 latest)
            image_tag=$(echo "$image_name_tag" | awk -F':' '{if (NF>1) print $2; else print "latest"}")

            # --- 关键修改：构建新镜像名逻辑 ---
            platform_prefix="${platform//\//_}_" # linux/amd64 -> linux_amd64_
            
            name_space_prefix=""
            # 如果镜像名重名，加上命名空间前缀
            if [[ -n "${duplicate_images[$image_name]}" ]]; then
               if [[ -n "${name_space}" ]]; then
                  name_space_prefix="${name_space}_"
               fi
            fi
            
            # 最终推送到阿里云的镜像名
            new_image="$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/$platform_prefix$name_space_prefix$image_name:$image_tag"
            
            echo "=================================================="
            echo "Building: $source_image"
            echo "Target: $new_image"
            echo "=================================================="

            # --- 关键修改：执行构建并推送 ---
            # 使用 buildx 直接构建并推送
            # 注意：这里假设你的 Dockerfile 在当前目录 (.)
            # 如果你的 Dockerfile 名字不同，请修改 -f 参数
            docker buildx build \
              --platform "$platform" \
              -t "$new_image" \
              --push .
            
            echo "Push completed: $new_image"
            
            # 清理构建缓存 (可选，防止磁盘满)
            docker builder prune -f
            
        done < images.txt
